

services:

  backend:
    build:
      context: ./appraisal_dp/appraisal_backend
      dockerfile: Dockerfile
    image: appraisal-backend:local
    container_name: appraisal_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: appraisal
      DB_USER: appraisal_manager
      DB_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-django-secret}
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,172.16.0.24,172.16.0.210,172.16.1.113,172.16.0.211,172.16.0.156"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://172.16.0.24,http://172.16.0.210,http://172.16.1.113,http://172.16.0.211,http://172.16.0.156"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://172.16.0.24,http://172.16.0.210,http://172.16.1.113,http://172.16.0.211,http://172.16.0.156"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "0 "
      DJANGO_CORS_ALLOWED_ALL_ORIGINS: "0"
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-this-admin-password}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DJANGO_SESSION_COOKIE_SECURE: "0"
      DJANGO_CSRF_COOKIE_SECURE: "0"
      DJANGO_SECURE_HSTS_SECONDS: "0"


    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./appraisal-form
      dockerfile: Dockerfile
    image: appraisal-frontend:local
    container_name: appraisal_frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: appraisal-nginx:local
    container_name: appraisal_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:15
    container_name: appraisal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appraisal
      POSTGRES_USER: appraisal_manager
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-db-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appraisal_manager -d appraisal"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
